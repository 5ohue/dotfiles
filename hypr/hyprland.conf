# Hyprland config:
#
# See https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.conf
# for a configuration example
#
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

#==============================================================================
# Monitors
#==============================================================================
# See https://wiki.hyprland.org/Configuring/Monitors/
#==============================================================================

monitor = , preferred, auto, 1

# Example
# monitor = DP-2, 2560x1440@320.00, 1920x0, 1.25
# monitor = HDMI-A-1, 1920x1080@60.00, 0x0, 1.0

#==============================================================================
# My programs
#==============================================================================
# See https://wiki.hyprland.org/Configuring/Keywords/
#==============================================================================
# Set programs that you use
$terminal = alacritty
$fileManager = nemo
$menu = rofi
$logout = wlogout

#==============================================================================
# Environment variables
#==============================================================================
# See https://wiki.hyprland.org/Configuring/Environment-variables/
#==============================================================================

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
# env = QT_AUTO_SCREEN_SCALE_FACTOR,1.25

env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# Fix empty "open with" in file managers
env = XDG_MENU_PREFIX,arch-

# Doesn't work
# env = ELECTRON_OZONE_PLATFORM_HINT,wayland

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# For Nvidia
# env = LIBVA_DRIVER_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct

#==============================================================================
# Autostart
#==============================================================================
# Autostart necessary processes (like notifications daemons, status bars, etc.)

exec-once = hyprctl setcursor Breeze White 24
exec-once = nm-applet & blueberry-tray
exec-once = $terminal
exec-once = waybar & hyprpaper

#==============================================================================
# Permissions
#==============================================================================
# See https://wiki.hyprland.org/Configuring/Permissions/
#==============================================================================
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#==============================================================================
# Look and feel
#==============================================================================
# See https://wiki.hyprland.org/Configuring/Variables/
# See https://wiki.hyprland.org/Configuring/Animations/
#==============================================================================

general {
    gaps_in = 2
    gaps_out = 2

    border_size = 2

    col.active_border = rgb(11aa66)
    col.inactive_border = rgb(595959)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    locale = "ru_RU"
}

decoration {
    rounding = 5
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.95
    dim_inactive = true
    dim_strength = 0.2

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1a88)
        offset = 3 3
    }

    blur {
        enabled = true
        size = 15
        passes = 1
    }
}

animations {
    enabled = no # yes, please :)
}

group {
    col.border_active = rgb(1166aa)
    col.border_inactive = rgb(595959)

    groupbar {
        font_weight_active = bold
        font_size = 12

        indicator_gap = 0
        indicator_height = 0

        gradients = true
        height = 18
        gradient_rounding = 9
        gaps_in = 0
        gaps_out = 0

        col.active = 0xaa2277bb
        col.inactive = 0xaa004466
        blur = true
    }
}

misc {
    font_family = "Liberation Sans"
    splash_font_family = "Liberation Sans"
}

xwayland {
    force_zero_scaling = true # Fix pixelated X11 apps
}

#==============================================================================
# Input
#==============================================================================
# https://wiki.hyprland.org/Configuring/Variables/#input
# https://wiki.hyprland.org/Configuring/Variables/#gestures
#==============================================================================

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

gestures {
    workspace_swipe_touch = false
}

#==============================================================================
# Keybindings
#==============================================================================
# See https://wiki.hyprland.org/Configuring/Keywords/
# See https://wiki.hyprland.org/Configuring/Binds/
#==============================================================================
# Sets "Windows" key as main modifier
$mainMod = SUPER

# Window management
bind = $mainMod, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, S, togglesplit,
bind = $mainMod, P, pseudo,

# Exec
bind = $mainMod Shift, L, exec, hyprlock
bind = $mainMod, M, exec, $logout
bind = $mainMod, R, exec, hyprlauncher
bind = $mainMod, W, exec, $menu -show window
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, T, exec, $terminal --title=scratchterm -e bash

# Screenshots
bind = ,         Print, exec, hyprshot -o $HOME/Pictures/Screenshots/hyprshot/ -z -m region
bind = $mainMod, Print, exec, hyprshot -o $HOME/Pictures/Screenshots/hyprshot/ -z -m window
bind = Shift,    Print, exec, hyprshot -o $HOME/Pictures/Screenshots/hyprshot/ -z -m output

# Move windows or focus
bind = $mainMod, left,  movewindow, l
bind = $mainMod, right, movewindow, r
bind = $mainMod, up,    movewindow, u
bind = $mainMod, down,  movewindow, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# Group stuff
bind = $mainMod, G, togglegroup
bind = $mainMod, Tab, changegroupactive
bind = $mainMod Alt, H, movewindoworgroup, l
bind = $mainMod Alt, L, movewindoworgroup, r
bind = $mainMod Alt, K, movewindoworgroup, u
bind = $mainMod Alt, J, movewindoworgroup, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod ALT, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

#==============================================================================
# Windows and workspaces
#==============================================================================
# See https://wiki.hyprland.org/Configuring/Window-Rules/
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/
#==============================================================================
# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# "Smart gaps" / "No gaps when only"
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# Terminal rules
windowrule = opacity 0.9, match:title ^Terminal$
windowrule {
    name = scratch-terminal
    match:title = ^scratchterm$

    float = 1
    size = monitor_w*0.5 monitor_h*0.5
    center = 1
    opacity = 0.9
}

# Waybar blur
layerrule {
    name = waybar
    match:namespace = waybar

    blur = 1
    blur_popups = 1
}

# No blur for hyprshot
layerrule {
    name = hyprshot
    match:namespace = selection

    blur = 0
}

#==============================================================================
